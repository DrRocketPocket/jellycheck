name: Build and Release Plugins

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            9.0.x

      - name: Restore dependencies
        run: |
          dotnet restore jellycheck.csproj
          dotnet restore jellycheck-10.11.csproj

      - name: Build Jellycheck 10.8 (net6.0)
        run: dotnet build jellycheck.csproj -c Release --no-restore

      - name: Build Jellycheck 10.11 (net9.0)
        run: dotnet build jellycheck-10.11.csproj -c Release --no-restore

      - name: Create Release Packages
        run: |
          mkdir -p release-assets
          
          # Zip 10.8 version (maintaining Jellycheck.dll name inside the zip)
          cd bin/Release/net6.0
          zip -j ../../../release-assets/Jellycheck-10.8.zip Jellycheck.dll
          cd ../../../
          
          # Zip 10.11 version (maintaining Jellycheck.dll name inside the zip)
          cd bin/Release/net9.0
          zip -j ../../../release-assets/Jellycheck-10.11.zip Jellycheck.dll
          cd ../../../

      - name: Calculate Checksums and Update Manifest
        shell: python
        run: |
          import json
          import hashlib

          def get_md5(filename):
              hash_md5 = hashlib.md5()
              with open(filename, "rb") as f:
                  for chunk in iter(lambda: f.read(4096), b""):
                      hash_md5.update(chunk)
              return hash_md5.hexdigest()

          hash_10_11 = get_md5("release-assets/Jellycheck-10.11.zip")
          hash_10_8 = get_md5("release-assets/Jellycheck-10.8.zip")

          with open("manifest.json", "r") as f:
              manifest = json.load(f)

          plugin = manifest[0]
          for version_entry in plugin["versions"]:
              abi = version_entry["targetAbi"]
              if abi in ["10.11.0.0", "10.10.0.0", "10.9.0.0"]:
                  version_entry["checksum"] = hash_10_11
              elif abi in ["10.8.0.0", "10.7.0.0"]:
                  version_entry["checksum"] = hash_10_8

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

      - name: Commit and Push Updated Manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git commit -m "Update manifest checksums for release [skip ci]" || echo "No changes to manifest"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Jellycheck-10.8.zip
            release-assets/Jellycheck-10.11.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
