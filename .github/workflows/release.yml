name: Build and Release Plugins

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            9.0.x

      - name: Build Jellycheck 10.8 (net6.0)
        run: |
          dotnet publish jellycheck.csproj \
            -c Release \
            -o publish/10.8 \
            --no-self-contained

      - name: Build Jellycheck 10.11 (net9.0)
        run: |
          dotnet publish jellycheck-10.11.csproj \
            -c Release \
            -o publish/10.11 \
            --no-self-contained

      - name: Create Release Packages
        run: |
          mkdir -p release-assets
          cd publish/10.8 && zip -j ../../release-assets/Jellycheck-10.8.zip Jellycheck.dll && cd ../..
          cd publish/10.11 && zip -j ../../release-assets/Jellycheck-10.11.zip Jellycheck.dll && cd ../..

      - name: Calculate Checksums and Update Manifest
        shell: python3 {0}
        run: |
          import json
          import hashlib

          def get_md5(filename):
              hash_md5 = hashlib.md5()
              with open(filename, "rb") as f:
                  for chunk in iter(lambda: f.read(4096), b""):
                      hash_md5.update(chunk)
              return hash_md5.hexdigest()

          hash_10_11 = get_md5("release-assets/Jellycheck-10.11.zip")
          hash_10_8  = get_md5("release-assets/Jellycheck-10.8.zip")

          print(f"10.11 checksum: {hash_10_11}")
          print(f"10.8  checksum: {hash_10_8}")

          with open("manifest.json", "r") as f:
              manifest = json.load(f)

          plugin = manifest[0]
          for version_entry in plugin["versions"]:
              abi = version_entry["targetAbi"]
              if abi.startswith("10.11") or abi.startswith("10.10") or abi.startswith("10.9"):
                  version_entry["checksum"] = hash_10_11
              elif abi.startswith("10.8") or abi.startswith("10.7"):
                  version_entry["checksum"] = hash_10_8

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("Manifest updated.")

      - name: Commit and Push Updated Manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git diff --cached --quiet || git commit -m "Update manifest checksums for release [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Jellycheck-10.8.zip
            release-assets/Jellycheck-10.11.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
